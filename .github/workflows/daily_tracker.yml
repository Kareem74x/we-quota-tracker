name: Daily Quota Tracker

on:
  schedule:
    - cron: '50 20 * * *'   # 10:50 PM Egypt time (UTC+2) = 20:50 UTC
  workflow_dispatch:        # Allow manual runs

jobs:
  run-tracker:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run quota tracker
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          LND_NUMBER: ${{ secrets.LND_NUMBER }}
          LND_PASS: ${{ secrets.LND_PASS }}
          START_GB: ${{ secrets.START_GB }}
        run: python main.py
